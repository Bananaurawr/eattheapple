<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eattheapple 🍏</title>
    <link rel="icon" href="logo-eat.png">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        #messages { height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .message { margin: 8px 0; }
        .message span { font-weight: bold; color: #4f46e5; }
        .system { color: gray; font-style: italic; }
        input { padding: 8px; margin-right: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #online { color: green; margin-bottom: 10px; font-size: 14px; }
        #login, #chat { }
        #chat { display: none; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login">
        <h2>Join Chatroom</h2>
        <input id="username-input" placeholder="Enter your username" />
        <button onclick="joinChat()">Join</button>
    </div>

    <!-- Chat Screen -->
    <div id="chat">
        <h2>Chatroom</h2>
        <div id="online">🟢 Online: ...</div>
        <div id="messages"></div>
        <input id="message-input" placeholder="Type a message..." style="width: 75%" />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const socket = io('http://localhost:5000')
        let myUsername = ''

        function joinChat() {
            const username = document.getElementById('username-input').value.trim()
            if (!username) return alert('Please enter a username!')

            myUsername = username
            document.getElementById('login').style.display = 'none'
            document.getElementById('chat').style.display = 'block'

            socket.emit('join', { username })
        }

        function sendMessage() {
            const text = document.getElementById('message-input').value.trim()
            if (!text) return

            socket.emit('message', { username: myUsername, text })
            document.getElementById('message-input').value = ''
        }

        // Press Enter to send
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage()
        })

        // Receive message
        socket.on('message', (data) => {
            addMessage(`${data.username}: ${data.text}`)
        })

        // Someone joined
        socket.on('user_joined', (data) => {
            addMessage(`${data.username} joined the chat`, 'system')
        })

        // Someone left
        socket.on('user_left', (data) => {
            addMessage(`${data.username} left the chat`, 'system')
        })

        // Online users list
        socket.on('online_users', (users) => {
            document.getElementById('online').textContent = `🟢 Online: ${users.join(', ')}`
        })

        function addMessage(text, type = 'normal') {
            const div = document.createElement('div')
            div.className = type === 'system' ? 'message system' : 'message'
            div.textContent = text
            const messages = document.getElementById('messages')
            messages.appendChild(div)
            messages.scrollTop = messages.scrollHeight  // auto scroll
        }
    </script>

</body>
</html>
